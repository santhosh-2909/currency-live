name: Daily Currency Update

on:
  schedule:
    - cron: '30 18 * * *'   # Runs daily at 18:30 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pandas

      - name: ▶ Run script
        env:
          FASTFOREX_API_KEY: ${{ secrets.FASTFOREX_API_KEY }}
        run: python currency_script.py

      - name: 💾 Commit and push CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add currency_to_inr_conversions.csv
          git commit -m "🔄 Daily currency update" || echo "No changes"
          git push
