name: Daily Currency Update

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 🔍 DEBUG: check files
      - name: 🔍 Check repo files
        run: ls -la

      # 🔥 FORCE INSTALL (NO DEPENDENCY ON FILE)
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      # 🔍 VERIFY INSTALL
      - name: 🔍 Verify installation
        run: python -m pip list

      - name: ▶ Run script
        run: python currency_script.py

      - name: 💾 Commit and push CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add currency_to_inr_conversions.csv
          git commit -m "🔄 Daily currency update" || echo "No changes"
          git push
